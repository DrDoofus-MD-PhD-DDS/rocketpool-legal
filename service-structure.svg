<svg width="1200" height="800" viewBox="0 0 1200 800"
     xmlns="http://www.w3.org/2000/svg"
     font-family="Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="800" fill="#ffffff"/>

  <!-- pDAO Center -->
  <circle cx="600" cy="380" r="110" fill="#f5f7fa" stroke="#2c3e50" stroke-width="3"/>
  <text x="600" y="360" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">
    pDAO
  </text>
  <text x="600" y="385" text-anchor="middle" font-size="13" fill="#2c3e50">
    Governance Signaling Hub
  </text>
  <text x="600" y="405" text-anchor="middle" font-size="11" fill="#2c3e50">
    Approves • Overturns • Mandates
  </text>

  <!-- Committees -->
  <!-- GMC -->
  <circle cx="350" cy="180" r="85" fill="#eef6ff" stroke="#1f5fa3" stroke-width="2"/>
  <text x="350" y="170" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f5fa3">
    GMC
  </text>
  <text x="350" y="192" text-anchor="middle" font-size="11" fill="#1f5fa3">
    Grants Allocation
  </text>

  <!-- IMC -->
  <circle cx="850" cy="180" r="85" fill="#eef6ff" stroke="#1f5fa3" stroke-width="2"/>
  <text x="850" y="170" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f5fa3">
    IMC
  </text>
  <text x="850" y="192" text-anchor="middle" font-size="11" fill="#1f5fa3">
    Incentive Programs
  </text>

  <!-- Security Council -->
  <circle cx="900" cy="480" r="80" fill="#fff4e6" stroke="#c97a1c" stroke-width="2"/>
  <text x="900" y="470" text-anchor="middle" font-size="15" font-weight="bold" fill="#c97a1c">
    Security Council
  </text>
  <text x="900" y="492" text-anchor="middle" font-size="11" fill="#c97a1c">
    Emergency Parameter Control
  </text>

  <!-- RPIP Editors -->
  <circle cx="300" cy="480" r="75" fill="#f0f0f0" stroke="#555555" stroke-width="2"/>
  <text x="300" y="470" text-anchor="middle" font-size="15" font-weight="bold" fill="#555555">
    RPIP Editors
  </text>
  <text x="300" y="492" text-anchor="middle" font-size="11" fill="#555555">
    Process Coordination
  </text>

  <!-- Treasurer -->
  <circle cx="600" cy="620" r="70" fill="#f0f8f5" stroke="#2e8b57" stroke-width="2"/>
  <text x="600" y="610" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e8b57">
    Treasurer
  </text>
  <text x="600" y="632" text-anchor="middle" font-size="11" fill="#2e8b57">
    Ministerial Execution
  </text>

  <!-- Admin / Coordination Layer -->
  <rect x="480" y="90" width="240" height="60" rx="12" ry="12"
        fill="#fafafa" stroke="#888888" stroke-width="2"/>
  <text x="600" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#555555">
    pDAO Administrative Coordination
  </text>
  <text x="600" y="135" text-anchor="middle" font-size="11" fill="#555555">
    Continuity • Liaison • Preparation
  </text>

  <!-- Service Entity -->
  <rect x="480" y="700" width="240" height="70" rx="12" ry="12"
        fill="#e8f1ff" stroke="#1f5fa3" stroke-width="2"/>
  <text x="600" y="725" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f5fa3">
    Service Entity
  </text>
  <text x="600" y="745" text-anchor="middle" font-size="11" fill="#1f5fa3">
    Contracts • Vendors • Insurance • Indemnification
  </text>

  <!-- Connection Lines (Neutral / Non-Hierarchical) -->
  <line x1="600" y1="270" x2="350" y2="260" stroke="#cccccc" stroke-width="2"/>
  <line x1="600" y1="270" x2="850" y2="260" stroke="#cccccc" stroke-width="2"/>
  <line x1="600" y1="430" x2="300" y2="430" stroke="#cccccc" stroke-width="2"/>
  <line x1="600" y1="430" x2="900" y2="430" stroke="#cccccc" stroke-width="2"/>
  <line x1="600" y1="490" x2="600" y2="550" stroke="#cccccc" stroke-width="2"/>
  <line x1="600" y1="670" x2="600" y2="700" stroke="#cccccc" stroke-width="2"/>

</svg>
